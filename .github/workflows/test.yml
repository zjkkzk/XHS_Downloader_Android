name: 🏗️ 构建 Release APK

on:
  # push:
  #   branches: [ master ]
  #   paths:
  #     - 'lyrico-app/**'
  #     - 'lyrico-audiotag/**'
  #     - 'lyrico-lyrics/**'
  #     - 'gradle/**'
  #     - 'build.gradle'
  #     - 'settings.gradle'
  #     - 'gradle.properties'
  #     - 'gradlew'
  #     - '.github/workflows/build-debug.yml'
  workflow_dispatch:

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ 构建 Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🌏 设置时区
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: ☕ 设置 JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔐 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 🐘 配置 Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🛠️ 构建 Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrico-release
          path: lyrico-app/build/outputs/apk/release/*.apk
          retention-days: 3
